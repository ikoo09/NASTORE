<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N/A STORE - Checkout System</title>
    <link rel="icon" type="image/x-icon" href="na.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * { box-sizing: border-box; font-family: 'Arial', sans-serif; transition: 0.3s; }
        body { 
            background-image: linear-gradient(rgba(255,255,255,0.9), rgba(139, 0, 0, 0.1)), url('bg2.jpg'); 
            background-size: cover; background-position: center; background-attachment: fixed; margin: 0; 
        }
        nav { 
            background: #8B0000; padding: 10px 5%; display: flex; justify-content: space-between; 
            align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #000; 
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; 
        }
        .logo-box img { height: 60px; width: auto; cursor: pointer; }
        .nav-links a { color: white; text-decoration: none; font-weight: 900; font-style: italic; margin: 0 10px; font-size: 14px; }
        .container { width: 95%; max-width: 800px; margin: 50px auto; padding-bottom: 50px; }
        .payment-card { background: #fff; padding: 30px; border: 5px solid #8B0000; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-radius: 10px; }
        .payment-card::after { 
            content: ""; background-image: url('na.png'); background-size: 300px; background-repeat: no-repeat; 
            background-position: center; opacity: 0.05; top: 0; left: 0; bottom: 0; right: 0; 
            position: absolute; z-index: 0; filter: grayscale(100%); pointer-events: none; 
        }
        .payment-card > * { position: relative; z-index: 1; }
        h2 { text-align: center; font-style: italic; font-weight: 900; color: #8B0000; border-bottom: 3px solid #8B0000; padding-bottom: 10px; margin-top: 30px; text-transform: uppercase; }
        input, select { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #eee; background: #f9f9f9; font-weight: bold; outline: none; border-radius: 5px; }
        
        .order-summary { background: rgba(253, 253, 253, 0.9); border: 1px solid #eee; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        .item-row { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #eee; padding: 15px 0; position: relative; }
        .item-row img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; }
        .item-info { flex: 1; }
        .item-info p { margin: 2px 0; font-size: 14px; font-weight: bold; }
        .remove-item { position: absolute; top: 10px; right: 5px; color: #ff0000; cursor: pointer; font-size: 18px; font-weight: 900; z-index: 10; }
        
        /* Area Peta */
        #map-picker { height: 350px; width: 100%; border: 2px solid #8B0000; border-radius: 8px; margin-bottom: 15px; z-index: 5; background: #f0f0f0; }
        
        .method-box { display: none; align-items: center; gap: 20px; margin: 20px 0; padding: 15px; border: 2px dashed #8B0000; border-radius: 10px; background: #fffcfc; }
        .method-box img { width: 70px; }
        .qris-display { display: none; text-align: center; margin: 20px 0; padding: 20px; border: 2px dashed #8B0000; border-radius: 10px; }
        .qris-img { width: 200px; border: 2px solid #000; margin-top: 10px; }
        .wa-btn { width: 100%; background: #25d366; color: white; border: none; padding: 20px; font-weight: 900; cursor: pointer; border-radius: 5px; font-size: 18px; text-transform: uppercase; margin-top: 20px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-box" onclick="window.location.href='index.html'"><img src="na.png" alt="Logo"></div>
        <div class="nav-links">
            <a href="index.html">BERANDA</a>
            <a href="#" style="border-bottom: 2px solid white;">CHECKOUT</a>
        </div>
    </nav>

    <div class="container">
        <div class="payment-card">
            <h2>RINGKASAN PESANAN</h2>
            <div id="order-details" class="order-summary"></div>
            <h3 id="total-price-checkout" style="text-align: right; color: #8B0000; font-weight: 900; font-style: italic;">TOTAL: Rp 0</h3>

            <h2>DATA PENGIRIMAN</h2>
            <input type="text" id="cust-name" placeholder="NAMA LENGKAP PENERIMA">
            <input type="text" id="cust-address" placeholder="ALAMAT LENGKAP (KOTA, KECAMATAN, NO RUMAH)">
            
            <p style="font-size: 12px; font-weight: 900; color: #8B0000; margin-bottom: 10px; text-align: center;">📍 TANDAI LOKASI RUMAH ANDA PADA PETA:</p>
            <div id="map-picker"></div>
            <input type="hidden" id="cust-coords" value="">

            <h2>METODE PEMBAYARAN</h2>
            <select id="pay-method" onchange="showBankInfo()">
                <option value="">-- PILIH METODE TRANSFER --</option>
                <option value="BCA">BANK BCA</option>
                <option value="DANA">DANA (SCAN QRIS)</option>
            </select>

            <div id="info-bca" class="method-box">
                <img src="bca.png" alt="BCA">
                <div class="method-info">
                    <p style="margin:0; font-size:12px; color:#8B0000;">TRANSFER BCA</p>
                    <p style="font-size:24px; font-weight:900; margin:5px 0;">8171526400</p>
                    <p style="margin:0; font-weight:bold;">A/N NICO DAMARA</p>
                </div>
            </div>

            <div id="info-dana" class="qris-display">
                <img src="dana.png" alt="Logo DANA" style="width: 100px;">
                <br>
                <img src="qris.jpg" alt="QRIS DANA" class="qris-img">
            </div>

            <button class="wa-btn" onclick="sendWA()">PESAN SEKARANG VIA WHATSAPP</button>
        </div>
    </div>

    <script>
        let cartData = JSON.parse(localStorage.getItem('cartData')) || [];
        let map, marker;

        function initMap() {
            // MENGGUNAKAN SERVER GOOGLE MAPS HYBRID (Lebih berwarna & detail)
            map = L.map('map-picker').setView([-6.2000, 106.8166], 13);
            
            L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains:['mt0','mt1','mt2','mt3'],
                attribution: '© Google Maps'
            }).addTo(map);

            setTimeout(() => { map.invalidateSize(); }, 500);

            map.on('click', function(e) {
                const { lat, lng } = e.latlng;
                if (marker) map.removeLayer(marker);
                marker = L.marker([lat, lng]).addTo(map);
                
                const mapsUrl = `https://www.google.com/maps?q=${lat},${lng}`;
                document.getElementById('cust-coords').value = mapsUrl;
                alert("📍 Lokasi berhasil ditandai!");
            });
        }

        function renderOrder() {
            const container = document.getElementById('order-details');
            const totalDisplay = document.getElementById('total-price-checkout');
            let total = 0;

            if (cartData.length === 0) {
                container.innerHTML = `<p style="text-align:center;">Keranjang kosong.</p>`;
                return;
            }

            container.innerHTML = cartData.map((item, idx) => {
                total += item.price;
                return `
                    <div class="item-row">
                        <span class="remove-item" onclick="removeItem(${idx})">✕</span>
                        <img src="${(item.images && item.images[0]) ? item.images[0] : 'na.png'}">
                        <div class="item-info">
                            <p>${item.name}</p>
                            <p style="color:#8B0000; font-size:12px;">UKURAN: ${item.selectedSize}</p>
                            <p>Rp ${item.price.toLocaleString('id-ID')}</p>
                        </div>
                    </div>`;
            }).join('');
            totalDisplay.innerText = `TOTAL: Rp ${total.toLocaleString('id-ID')}`;
        }

        function removeItem(idx) {
            if(confirm("Hapus item?")) {
                cartData.splice(idx, 1);
                localStorage.setItem('cartData', JSON.stringify(cartData));
                renderOrder();
            }
        }

        function showBankInfo() {
            const method = document.getElementById('pay-method').value;
            document.getElementById('info-bca').style.display = (method === 'BCA') ? 'flex' : 'none';
            document.getElementById('info-dana').style.display = (method === 'DANA') ? 'block' : 'none';
        }

        function sendWA() {
            const name = document.getElementById('cust-name').value.trim();
            const addr = document.getElementById('cust-address').value.trim();
            const maps = document.getElementById('cust-coords').value;
            const pay = document.getElementById('pay-method').value;

            if (cartData.length === 0) return alert("Keranjang kosong!");
            if (!name || !addr || !pay) return alert("Lengkapi data!");

            let list = cartData.map((i, n) => `${n+1}. ${i.name} (${i.selectedSize})`).join('\n');
            const total = cartData.reduce((acc, curr) => acc + curr.price, 0);

            const msg = `*PESANAN BARU - N/A STORE*\n` +
                        `----------------------------\n` +
                        `*Nama:* ${name}\n` +
                        `*Alamat:* ${addr}\n` +
                        `*Lokasi Maps:* ${maps ? maps : 'Tidak ditandai'}\n` +
                        `*Metode:* ${pay}\n` +
                        `----------------------------\n` +
                        `*Daftar Barang:*\n${list}\n` +
                        `----------------------------\n` +
                        `*TOTAL PEMBAYARAN: Rp ${total.toLocaleString('id-ID')}*`;

            window.open(`https://wa.me/6287870574909?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = () => { renderOrder(); initMap(); };
    </script>
</body>
</html>
