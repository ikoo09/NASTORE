<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N/A STORE - Official</title>
    <link rel="icon" type="image/x-icon" href="na.png">
    <style>
        * { box-sizing: border-box; font-family: 'Helvetica', Arial, sans-serif; transition: 0.3s; }
        body { background: #fff; margin: 0; overflow-x: hidden; padding-bottom: 60px; }

        /* Navigation */
        nav { 
            background: #000; padding: 15px 5%; display: flex; justify-content: space-between; 
            align-items: center; position: sticky; top: 0; z-index: 1000; color: white;
        }
        
        /* Logo N/A di kiri */
        .logo-box-left img { height: 35px; }
        
        /* BOX LOGO TENGAH - PERBAIKAN: AGAR TIDAK TERPOTONG/PENYOK */
        .logo-box-center { 
            position: absolute; 
            left: 50%; 
            transform: translateX(-50%); 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        .logo-box-center img { 
            height: 40px; 
            width: 40px; 
            object-fit: contain; /* Agar seluruh logo masuk ke dalam lingkaran tanpa terpotong */
            border-radius: 50%; 
            border: 1px solid #333;
            background: #000; /* Menutup area kosong jika logo tidak kotak 1:1 */
            padding: 3px; /* Memberi ruang agar logo tidak menyentuh garis tepi */
        }

        .nav-links { display: flex; align-items: center; }
        .nav-links a { color: white; text-decoration: none; font-weight: bold; font-size: 12px; margin-left: 20px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; }
        
        .cart-icon-nav { font-size: 18px; margin-right: 5px; }

        /* Hero Section */
        .hero { 
            background: #000; height: 40vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white; text-align: center;
            position: relative; overflow: hidden;
        }
        .hero::before {
            content: ""; position: absolute; width: 100%; height: 100%;
            background: url('na.png') no-repeat center;
            background-size: contain; opacity: 0.15; pointer-events: none;
        }
        .hero h1 {
            position: relative;
            font-size: 85px;
            font-weight: 900;
            letter-spacing: -2px;
            text-transform: uppercase;
            margin: 10px 0;
            z-index: 2;
            
            /* Efek Miring sesuai permintaan sebelumnya */
            font-style: italic;
            
            /* Efek Silver Metallic dengan Gradasi Kilap Tinggi */
            background: linear-gradient(
                to bottom, 
                #cfd8dc 0%, 
                #eceff1 20%, 
                #b0bec5 40%, 
                #ffffff 50%, 
                #78909c 55%, 
                #90a4ae 80%, 
                #cfd8dc 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            /* Efek 3D Menonjol yang Dalam (Deep 3D Shadow) mirip model gambar */
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.6));
            text-shadow: 
                0 1px 0 #ffffff,
                0 2px 0 #676060,
                0 3px 0 #232323,
                0 4px 0 #666,
                0 5px 0 #555,
                0 6px 0 #444,
                0 7px 0 #424040,
                0 8px 7px rgba(0,0,0,0.5),
                0 9px 10px rgba(0,0,0,0.3);
        }

        .category-menu { display: flex; justify-content: center; gap: 20px; margin: 50px 0; }
        .cat-btn { background: none; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 13px; color: #bbb; border-bottom: 2px solid transparent; }
        .cat-btn.active { color: #000; border-bottom: 2px solid #000; }

        .container { width: 95%; margin: 0 auto 80px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; align-items: end; }
        
        .product-card { text-align: center; cursor: pointer; position: relative; }
        .img-container { background: #fff; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; min-height: 300px; }
        .main-product-img { max-width: 100%; max-height: 350px; object-fit: contain; }
        
        .product-info { min-height: 60px; display: flex; flex-direction: column; justify-content: flex-end; }
        .product-info h3 { font-size: 13px; text-transform: uppercase; margin: 0 0 8px; font-weight: bold; color: #000; }
        .product-info p { font-size: 13px; color: #000; margin: 0; font-weight: 500; }

        /* Modal & Cart Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 5000; justify-content: center; align-items: center; }
        .modal-content { background: #000; width: 100%; height: 100%; display: flex; position: relative; color: white; }
        .modal-left { flex: 1.2; background: #fff; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .modal-left img { max-width: 85%; max-height: 85vh; object-fit: contain; position: relative; z-index: 2; }

        .slider-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.1); color: #000; border: 1px solid #000; font-size: 24px; padding: 15px 10px; cursor: pointer; z-index: 5; }
        .prev { left: 20px; }
        .next { right: 20px; }

        .modal-right { flex: 1; padding: 60px; display: flex; flex-direction: column; justify-content: center; }
        .close-modal { position: absolute; top: 30px; right: 40px; font-size: 40px; cursor: pointer; color: #fff; z-index: 10; }
        
        .size-box { display: flex; gap: 10px; margin: 20px 0; }
        .size-btn { flex: 1; padding: 15px; border: 1px solid #333; background: #000; color: white; cursor: pointer; font-weight: bold; }
        .size-btn.selected { background: #8B0000; border-color: #8B0000; }

        .qty-box { margin-bottom: 30px; }
        .qty-label { font-size: 12px; font-weight: bold; margin-bottom: 10px; display: block; text-transform: uppercase; }
        .stepper { display: flex; align-items: center; background: #111; border: 1px solid #333; width: fit-content; }
        .stepper button { background: none; border: none; color: white; padding: 10px 20px; cursor: pointer; font-size: 20px; font-weight: bold; }
        .stepper span { width: 50px; text-align: center; font-size: 16px; font-weight: bold; }

        .btn-buy { background: #8B0000; color: white; border: none; padding: 20px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 15px; }
        
        #cart-panel { position: fixed; top: 0; right: -400px; width: 380px; height: 100%; background: #fff; z-index: 6000; padding: 30px; box-shadow: -10px 0 30px rgba(0,0,0,0.2); color: #000; }
        #cart-panel.active { right: 0; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .cart-item-left { display: flex; align-items: center; gap: 15px; }
        .cart-item img { width: 60px; height: 60px; object-fit: contain; }
        .cart-item-details b { font-size: 13px; text-transform: uppercase; display: block; }
        .cart-item-details small { color: #666; }
        .remove-btn { cursor: pointer; font-size: 18px; font-weight: bold; color: #999; padding-left: 10px; }
        .remove-btn:hover { color: #000; }

        .running-text-container { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; color: #fff; padding: 12px 0; z-index: 2000; font-weight: bold; font-size: 14px; overflow: hidden; }
        .marquee { display: inline-block; white-space: nowrap; padding-left: 100%; animation: marquee 25s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        @media screen and (max-width: 768px) {
            .grid { grid-template-columns: repeat(2, 1fr) !important; gap: 15px !important; padding: 10px; }
            .hero h1 { font-size: 40px !important; }
            .modal-content { flex-direction: column !important; overflow-y: auto; }
            .modal-left, .modal-right { flex: none !important; width: 100% !important; }
            .modal-right { padding: 20px !important; }
            nav { padding: 10px 3% !important; height: auto; flex-wrap: wrap; }
            
            .logo-box-center { position: static; transform: none; order: 3; width: 100%; justify-content: center; margin-top: 10px; }
            .logo-box-center img { height: 32px; width: 32px; }
            
            .nav-links a { font-size: 10px !important; margin-left: 10px !important; }
            #cart-panel { width: 100% !important; right: -100%; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo-box-left"><img src="na.png"></div>

    <div class="logo-box-center">
        <img src="store.png" alt="Store">
        <img src="hs.webp" alt="Hades">
        <img src="devotus.jpg" alt="Devotus">
        <img src="cc.jpg" alt="City Cycle">
        <img src="nocturnal.webp" alt="Nocturnal">
    </div>

    <div class="nav-links">
        <a href="index.html">STORE</a>
        <a href="index2.html">CHECKOUT</a>
        <a href="javascript:void(0)" onclick="toggleCart()">
            <span class="cart-icon-nav">🛒</span> (<span id="cart-count">0</span>)
        </a>
    </div>
</nav>

<div class="hero">
    <p>AUTHENTIC LOCAL BRAND</p>
    <h1>ALL STYLE</h1>
</div>

<div class="category-menu">
    <button onclick="filterProduct('all', this)" class="cat-btn active">SEMUA</button>
    <button onclick="filterProduct('devotus', this)" class="cat-btn">DEVOTUS</button>
    <button onclick="filterProduct('hades', this)" class="cat-btn">HADES</button>
    <button onclick="filterProduct('city cycle', this)" class="cat-btn">CITY CYCLE</button>
    <button onclick="filterProduct('nocturnal', this)" class="cat-btn">NOCTURNAL</button>
</div>

<div class="container">
    <div class="grid" id="product-grid"></div>
</div>

<div class="modal-overlay" id="quick-view">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-left">
            <button class="slider-btn prev" onclick="changeImage(-1)">&#10094;</button>
            <img id="modal-img" src="">
            <button class="slider-btn next" onclick="changeImage(1)">&#10095;</button>
        </div>
        <div class="modal-right">
            <h2 id="modal-name">PRODUCT NAME</h2>
            <p id="modal-price">Rp 0</p>
            <div class="size-box" id="modal-sizes"></div>
            <div class="qty-box">
                <label class="qty-label">JUMLAH</label>
                <div class="stepper">
                    <button onclick="changeQty(-1)">-</button>
                    <span id="modal-qty">1</span>
                    <button onclick="changeQty(1)">+</button>
                </div>
            </div>
            <button class="btn-buy" onclick="addFromModal()">TAMBAHKAN KE KERANJANG</button>
        </div>
    </div>
</div>

<div id="cart-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="font-weight: 900; margin: 0;">KERANJANG</h2>
        <span onclick="toggleCart()" style="cursor:pointer; font-size:30px;">&times;</span>
    </div>
    <div id="cart-list" style="height: 70%; overflow-y: auto;"></div>
    <div style="padding-top:20px; border-top: 2px solid #000; position: absolute; bottom: 30px; width: calc(100% - 60px);">
        <h3 id="total-price" style="display:flex; justify-content:space-between; margin-bottom: 20px;">TOTAL: <span>Rp 0</span></h3>
        <button onclick="location.href='index2.html'" style="width:100%; background:#000; color:#fff; padding:18px; border:none; cursor:pointer; font-weight:bold; text-transform: uppercase;">Lanjut ke Checkout</button>
    </div>
</div>

<div class="running-text-container">
    <div class="marquee">STREETWEAR STYLE AND VIETNAM LOKAL BRAND, GERATIS ONGKIR DI SELURUH KOTA SINGKAWANG.</div>
</div>

<script>
const products = [
    { id: 1, name: 'Polo Overthinking', brand: 'CITY CYCLE', price: 370000, sizes: ['M','L','XL'], images: ['city1.webp', 'sizepoloover.jpg'] },
    { id: 2, name: 'RAIDER KHAKI SHORTS', brand: 'HADES', price: 800000, sizes: ['S','M','L'], images: ['hadesraiderkhaki.jpg', 'hadesraiderkhaki2.jpg','hadesraiderkhaki3.jpg','sizehsshorts.png'] },
    { id: 3, name: 'CARGO SHORT JEANS', brand: 'DEVOTUS', price: 430000, sizes: ['M','L','XL'], images: ['devcelana.png','devcelana2.jpg','devcelana3.jpg','devcelana4.jpg'] },
    { id: 4, name: 'Culture Zipper Hoodie', brand: 'NOCTURNAL', price: 348000, sizes: ['M','L','XL'], images: ['nocturnal1.webp', 'nocturnal2.webp','sizehoodienocturnal.jpg'] },
    { id: 5, name: 'HADES ASTRAL DENIM PANTS', brand: 'HADES', price: 920000, sizes: ['S','M','L'], images: ['hadesastral denim.jpg','hadesastraldenim2.jpg','hadesastraldenim3.jpg','denimsize.jpg'] },
    { id: 6, name: 'HADES ARTHROPOD WASH JEANS', brand: 'HADES', price: 860000, sizes: ['M','L','XL'], images: ['hadesarthropodw.jpg','hadesarthropodw2.jpg','hadesarthropodw3.jpg','sizehadesarthropodw.png'] },
    { id: 7, name: 'DEVOTUS HOOIDE BIG TYPO', brand: 'DEVOTUS', price: 380000, sizes: ['L','XL'], images: ['devotushoodie.webp','devotushoodie2.jpg','devotushoodiesize.jpg'] },
    { id: 8, name: 'NOCTURNAL CARGO PANTS', brand: 'NOCTURNAL', price: 420000, sizes: ['M','L'], images: ['image_3625e0.png'] },
    { id: 9, name: 'HADES VINTAGE SHIRT', brand: 'HADES', price: 320000, sizes: ['M','L'], images: ['image_3625e0.png'] },
    { id: 10, name: 'CITY STREET SWEATER', brand: 'CITY CYCLE', price: 290000, sizes: ['S','M','L'], images: ['image_3625e0.png'] },
    { id: 11, name: 'DEVOTUS SLIM JEANS', brand: 'DEVOTUS', price: 460000, sizes: ['M','L','XL'], images: ['image_3625e0.png'] },
    { id: 12, name: 'NOCTURNAL GRAPHIC TEE', brand: 'NOCTURNAL', price: 210000, sizes: ['M','L','XL'], images: ['image_3625e0.png'] },
    { id: 13, name: 'HADES CHINO SHORTS', brand: 'HADES', price: 275000, sizes: ['S','M','L'], images: ['image_3625e0.png'] },
    { id: 14, name: 'CITY CYCLE CAP', brand: 'CITY CYCLE', price: 150000, sizes: ['All Size'], images: ['image_3625e0.png'] },
    { id: 15, name: 'DEVOTUS OVERSIZE TEE', brand: 'DEVOTUS', price: 235000, sizes: ['XL','XXL'], images: ['image_3625e0.png'] },
    { id: 16, name: 'NOCTURNAL COACH JACKET', brand: 'NOCTURNAL', price: 485000, sizes: ['M','L'], images: ['image_3625e0.png'] },
    { id: 17, name: 'HADES LEATHER BELT', brand: 'HADES', price: 120000, sizes: ['All Size'], images: ['image_3625e0.png'] },
    { id: 18, name: 'CITY RACING GLOVES', brand: 'CITY CYCLE', price: 195000, sizes: ['M','L'], images: ['image_3625e0.png'] },
    { id: 19, name: 'DEVOTUS ANKLE PANTS', brand: 'DEVOTUS', price: 310000, sizes: ['M','L','XL'], images: ['image_3625e0.png'] },
    { id: 20, name: 'NOCTURNAL MASK FACE', brand: 'NOCTURNAL', price: 85000, sizes: ['All Size'], images: ['image_3625e0.png'] }
];

let cart = JSON.parse(localStorage.getItem('cartData')) || [];
let currentProduct = null;
let currentImgIndex = 0;
let selectedSize = "";
let currentQty = 1;

function filterProduct(brand, btn) {
    const grid = document.getElementById('product-grid');
    grid.innerHTML = "";
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = brand === 'all' ? products : products.filter(p => p.brand.toLowerCase() === brand.toLowerCase());
    filtered.forEach(p => {
        grid.innerHTML += `
        <div class="product-card" onclick="openModal(${p.id})">
            <div class="img-container"><img src="${p.images[0]}" class="main-product-img"></div>
            <div class="product-info">
                <h3>${p.name}</h3>
                <p>Rp ${p.price.toLocaleString('id-ID')}</p>
            </div>
        </div>`;
    });
}

function openModal(id) {
    currentProduct = products.find(p => p.id === id);
    currentImgIndex = 0;
    selectedSize = "";
    currentQty = 1;
    document.getElementById('modal-img').src = currentProduct.images[0];
    document.getElementById('modal-name').innerText = currentProduct.name;
    document.getElementById('modal-price').innerText = `Rp ${currentProduct.price.toLocaleString('id-ID')}`;
    document.getElementById('modal-qty').innerText = currentQty;
    const sizeDiv = document.getElementById('modal-sizes');
    sizeDiv.innerHTML = currentProduct.sizes.map(s => `<button class="size-btn" onclick="selectSize('${s}', this)">${s}</button>`).join('');
    document.getElementById('quick-view').style.display = 'flex';
}

function changeImage(dir) {
    if (!currentProduct) return;
    currentImgIndex += dir;
    if (currentImgIndex >= currentProduct.images.length) currentImgIndex = 0;
    if (currentImgIndex < 0) currentImgIndex = currentProduct.images.length - 1;
    document.getElementById('modal-img').src = currentProduct.images[currentImgIndex];
}

function changeQty(val) {
    currentQty += val;
    if (currentQty < 1) currentQty = 1;
    document.getElementById('modal-qty').innerText = currentQty;
}

function selectSize(size, btn) {
    selectedSize = size;
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
}

function closeModal() { document.getElementById('quick-view').style.display = 'none'; }

function addFromModal() {
    if(!selectedSize) return alert("PILIH UKURAN TERLEBIH DAHULU!");
    for(let i=0; i<currentQty; i++) {
        cart.push({...currentProduct, selectedSize: selectedSize});
    }
    updateCartUI();
    closeModal();
    toggleCart();
}

function updateCartUI() {
    const list = document.getElementById('cart-list');
    let total = 0;
    list.innerHTML = cart.map((item, idx) => {
        total += item.price;
        return `
        <div class="cart-item">
            <div class="cart-item-left">
                <img src="${item.images[0]}">
                <div class="cart-item-details">
                    <b>${item.name}</b>
                    <small>SIZE: ${item.selectedSize}</small>
                </div>
            </div>
            <div class="remove-btn" onclick="cart.splice(${idx},1); updateCartUI()">✕</div>
        </div>`;
    }).join('');
    document.getElementById('cart-count').innerText = cart.length;
    document.getElementById('total-price').innerHTML = `TOTAL: <span>Rp ${total.toLocaleString('id-ID')}</span>`;
    localStorage.setItem('cartData', JSON.stringify(cart));
}

function toggleCart() { document.getElementById('cart-panel').classList.toggle('active'); }

window.onload = () => {
    filterProduct('all', document.querySelector('.cat-btn'));
    updateCartUI();
};
</script>
</body>
</html>
