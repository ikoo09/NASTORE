<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N/A STORE - Official</title>
    <link rel="icon" type="image/x-icon" href="na.png">
    <style>
        /* --- CSS DASAR & TEMA --- */
        * { box-sizing: border-box; font-family: 'Arial', sans-serif; transition: 0.3s; }
        body { 
            background-image: linear-gradient(rgba(255,255,255,0.9), rgba(139, 0, 0, 0.1)), url('bg2.jpg'); 
            background-size: cover; background-position: center; background-attachment: fixed; margin: 0; 
        }

        /* --- Navbar Rapih (Menghilangkan tulisan bertumpuk) --- */
        nav { 
            background: #8B0000; padding: 10px 5%; display: flex; justify-content: space-between; 
            align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid #000; 
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; 
        }
        .logo-box img { height: 50px; width: auto; cursor: pointer; }
        
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a { 
            color: white; text-decoration: none; font-weight: 900; font-style: italic; 
            font-size: 14px; text-transform: uppercase; letter-spacing: 1px;
        }
        .nav-links a:hover { color: #000; }

        .nav-btn { background: none; border: none; color: white; cursor: pointer; font-size: 22px; position: relative; }
        .badge { position: absolute; top: -5px; right: -8px; background: #fff; color: #000; font-size: 11px; padding: 2px 6px; border-radius: 50%; font-weight: bold; }

        /* --- Hero Section --- */
        .hero { 
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('bg.jpg'); 
            background-size: cover; background-position: center; height: 400px; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; color: white; 
            text-align: center; border-bottom: 5px solid #9bb2bf8d; 
        }
        .hero h1 { font-size: 60px; margin: 10px 0; text-transform: uppercase; font-style: italic; font-weight: 900; letter-spacing: 3px; }
        .brand-logos { display: flex; gap: 15px; margin-top: 15px; }
        .brand-logos img { height: 35px; border-radius: 5px; opacity: 0.9; }

        /* --- Menu Kategori --- */
        .category-menu { display: flex; justify-content: center; gap: 10px; margin: 30px 0; flex-wrap: wrap; }
        .cat-btn { background: #000; color: white; border: none; padding: 12px 30px; font-weight: 900; font-style: italic; cursor: pointer; text-transform: uppercase; border-radius: 8px; }
        .cat-btn.active, .cat-btn:hover { background: #8B0000; box-shadow: 0 5px 15px rgba(139, 0, 0, 0.4); }

        /* --- Grid Produk --- */
        .container { width: 95%; margin: 0 auto 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { 
            background: #fff; padding: 45px 15px 15px; text-align: center; position: relative; 
            border: 4px solid #8B0000; display: flex; flex-direction: column; 
            justify-content: space-between; min-height: 520px; 
        }
        .card::before { 
            content: attr(data-brand); position: absolute; top: -15px; left: 50%; transform: translateX(-50%); 
            background: #8B0000; color: white; padding: 3px 20px; font-size: 11px; font-weight: 900; 
            font-style: italic; clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%); white-space: nowrap; 
        }
        .main-product-img { width: 100%; height: auto; border-radius: 5px; cursor: pointer; }
        .price-tag { font-size: 22px; font-weight: 900; font-style: italic; color: #8B0000; border-bottom: 3px solid #8B0000; display: inline-block; margin: 15px 0; }
        .add-btn { width: 100%; background: #000; color: white; border: none; padding: 15px; cursor: pointer; font-weight: 900; text-transform: uppercase; font-style: italic; }

        /* --- Panel Keranjang --- */
        #cart-panel { position: fixed; top: 0; right: -400px; width: 360px; height: 100%; background: #000; color: #fff; z-index: 2000; padding: 30px; display: flex; flex-direction: column; transition: 0.4s; }
        #cart-panel.active { right: 0 !important; }
        .close-btn { cursor: pointer; font-size: 30px; position: absolute; top: 20px; right: 25px; color: #8B0000; }
        .cart-item { border-bottom: 1px solid #222; padding: 15px 0; display: flex; gap: 10px; align-items: center; }
        .cart-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

<nav>
    <div class="logo-box" onclick="location.reload()" style="display: flex; align-items: center; gap: 10px;">
        <!-- Logo N/A (Lama) -->
        <img src="na.png" alt="Logo" style="height: 50px;"> 
        
        <!-- LOGO BARU (Ditambahkan di sini) -->
        <img src="store.png" alt="Logo Baru" style="height: 40px; width: auto;">
    </div>
    
    <!-- Menu Tengah (Hanya Link Bersih) -->
    <div class="nav-links">
        <a href="index.html">BERANDA</a>
        <a href="index2.html">CHECKOUT</a>
    </div>

    <button class="nav-btn" onclick="toggleCart()">🛒 <span class="badge" id="cart-count">0</span></button>
</nav>

<div class="hero">
    <p style="font-weight: bold; letter-spacing: 2px;">authentic local brand VIETNAM</p>
    <h1>ALL STYLE</h1>
    <img src="na.png" alt="Logo" style="width: 70px;">
    
    <!-- Logo Brand Kecil -->
    <div class="brand-logos">
        <img src="devotus.jpg">
        <img src="hs.webp">
        <img src="cc.jpg">
        <img src="nocturnal.webp">
    </div>
</div>

<div class="category-menu">
    <button onclick="filterProduct('all', this)" class="cat-btn active">SEMUA</button>
    <button onclick="filterProduct('devotus', this)" class="cat-btn">DEVOTUS</button>
    <button onclick="filterProduct('hades', this)" class="cat-btn">HADES</button>
    <button onclick="filterProduct('city cycle', this)" class="cat-btn">CITY CYCLE</button>
    <button onclick="filterProduct('nocturnal', this)" class="cat-btn">NOCTURNAL</button>
</div>

<div class="container">
    <div class="grid" id="product-grid"></div>
</div>

<!-- Panel Keranjang -->
<div id="cart-panel">
    <span class="close-btn" onclick="toggleCart()">&times;</span>
    <h2 style="font-style: italic; font-weight: 900; border-bottom: 2px solid #8B0000; padding-bottom: 10px;">KERANJANG</h2>
    <div id="cart-list" style="flex: 1; overflow-y: auto;"></div>
    <div style="margin-top: 20px; border-top: 1px solid #222; padding-top: 15px;">
        <h3 id="total-price" style="font-weight: 900;">TOTAL: Rp 0</h3>
        <button onclick="goToCheckout()" style="width:100%; background:#8B0000; color:white; padding:15px; border:none; cursor:pointer; font-weight:900;">CHECK OUT</button>
    </div>
</div>

<script>
const products = [
    { id: 1, name: 'Polo Overthinking', brand: 'CITY CYCLE', price: 370000, sizes: ['M','L','XL'], images: ['city1.webp', 'cityukuran.jpg'] },
    { id: 2, name: 'RAIDER KHAKI SHORTS', brand: 'HADES', price: 800000, sizes: ['S','M','L'], images: ['hadesraiderkhaki.jpg', 'hadesraiderkhaki2.jpg'] },
    { id: 3, name: 'CARGO SHORT JEANS', brand: 'DEVOTUS', price: 430000, sizes: ['M','L','XL'], images: ['devcelana.png', 'devcelana2.jpg','devcelana3.jpg','devcelana4.jpg'] },
    { id: 4, name: 'Culture Zipper Hoodie', brand: 'NOCTURNAL', price: 348000, sizes: ['M','L','XL'], images: ['nocturnal1.webp', 'sizehoodienocturnal.jpg'] }
];

let cart = [];

function filterProduct(brand, btn) {
    const grid = document.getElementById('product-grid');
    grid.innerHTML = "";
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    const filtered = brand === 'all' ? products : products.filter(p => p.brand.toLowerCase() === brand.toLowerCase());
    filtered.forEach(p => {
        grid.innerHTML += `
        <div class="card" data-brand="${p.brand}">
            <img id="img-${p.id}" src="${p.images[0]}" class="main-product-img">
            <div style="display:flex; justify-content:center; gap:5px; margin:10px 0;">
                ${p.images.map(img => `<img src="${img}" style="width:40px; height:40px; cursor:pointer; border:1px solid #ccc; border-radius:4px;" onclick="document.getElementById('img-${p.id}').src='${img}'">`).join('')}
            </div>
            <h3>${p.name}</h3>
            <div class="price-tag">Rp ${p.price.toLocaleString('id-ID')}</div>
            <button class="add-btn" onclick="addToCart(${p.id})">+ Keranjang</button>
        </div>`;
    });
}

function addToCart(id) {
    const p = products.find(prod => prod.id === id);
    cart.push({...p, selectedSize: ""});
    updateCartUI();
}

function updateCartUI() {
    const list = document.getElementById('cart-list');
    let total = 0;
    list.innerHTML = cart.map((item, idx) => {
        total += item.price;
        return `
        <div class="cart-item">
            <img src="${item.images[0]}">
            <div style="flex:1">
                <div style="font-size:12px; font-weight:bold">${item.name}</div>
                <select onchange="cart[${idx}].selectedSize=this.value" style="background:#111; color:white; font-size:10px; margin-top:5px;">
                    <option value="">SIZE</option>
                    ${item.sizes.map(s => `<option value="${s}">${s}</option>`).join('')}
                </select>
            </div>
            <div style="cursor:pointer" onclick="cart.splice(${idx},1); updateCartUI()">✕</div>
        </div>`;
    }).join('');
    document.getElementById('cart-count').innerText = cart.length;
    document.getElementById('total-price').innerText = `TOTAL: Rp ${total.toLocaleString('id-ID')}`;
}

function toggleCart() { document.getElementById('cart-panel').classList.toggle('active'); }

function goToCheckout() {
    if(cart.length === 0) return alert("Keranjang kosong!");
    if(cart.some(i => !i.selectedSize)) return alert("Pilih SIZE dulu!");
    localStorage.setItem('cartData', JSON.stringify(cart));
    window.location.href = "index2.html";
}

window.onload = () => filterProduct('all', document.querySelector('.cat-btn'));
</script>
</body>
</html>
